name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API deps
        run: npm ci
        working-directory: api

      - name: Run tests
        run: npm test
        working-directory: api

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install deps
        run: |
          npm ci --prefix api
          npm ci --prefix web

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Deploy web SPA (app.eraflow.dev)
        run: npx wrangler deploy
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Refresh apex landing (api/public)
        run: |
          rm -rf api/public/*
          cp -r web/dist/. api/public/

      - name: Deploy API worker (api.eraflow.dev + eraflow.dev)
        run: npx wrangler deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
