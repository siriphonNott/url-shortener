name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API deps
        run: npm ci
        working-directory: api

      - name: Run tests
        run: npm test
        working-directory: api

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install deps
        run: |
          npm ci --prefix api
          npm ci --prefix web

      # Apply schema changes BEFORE deploying so the new Worker never runs against an
      # un-migrated DB (the expand-then-deploy order). A migration failure here aborts the
      # deploy before any code ships. Runs only pending migrations (tracked in d1_migrations);
      # non-interactive wrangler auto-confirms.
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply blly-db --remote
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Deploy web SPA (app.blly.to)
        run: npx wrangler deploy
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Refresh apex landing (api/public)
        run: |
          rm -rf api/public/*
          cp -r web/dist/. api/public/

      - name: Deploy API worker (api.blly.to + blly.to)
        run: npx wrangler deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
